name: Testkube AI Trigger

on:
  pull_request:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      changed_path:
        description: 'Path to simulate change'
        required: false
        default: '**'

jobs:
  trigger-testkube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Testkube
        uses: kubeshop/setup-testkube@v1
        with:
          organization: ${{ secrets.TK_ORG_ID }}
          environment: ${{ secrets.TK_ENV_ID }}
          token: ${{ secrets.TK_API_TOKEN }}

      - name: Extract changed files
        run: |
          git fetch origin main
          echo "Changed files:"
          git diff --name-only origin/main...HEAD

      - name: Run Orchestrator
        run: |
          echo "Triggering AI orchestrator"
          testkube run testworkflow ai-code-analysis-orchestrator
